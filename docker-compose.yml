services:
  db:
    image: postgres:16-alpine
    container_name: avachat-postgres
    environment:
      POSTGRES_USER: avachat
      POSTGRES_PASSWORD: avachat
      POSTGRES_DB: avachat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "avachat"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: avachat-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
